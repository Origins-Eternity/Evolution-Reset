# Configuration file

general {
    # Whether to add blocks or not.
    B:"Enable Blocks"=true

    # Whether to add blueprints or not.
    B:"Enable Blueprints"=true

    # Whether to add tpa commands or not.
    B:"Enable Commands"=true

    # Whether to change default world type to RTG or not.
    B:"Enable Default World Type"=true

    # Whether to add endurance system or not.
    B:"Enable Endurance"=true

    # Whether to add fluids or not.
    B:"Enable Fluids"=true

    # Whether to add a tooltip for foods or not.
    B:"Enable Food Tooltip"=true

    # Whether damage from drown, lava or lightning should kill player immediately.
    B:"Enable Hardcore"=true

    # Whether to add herbs or not. Only work for Fisrt Aid!
    B:"Enable Herbs"=true

    # Whether to add items or not.
    B:"Enable Items"=true

    # Whether to add material or not.(Require enable items, fluids and ores!)
    B:"Enable Material"=true

    # Whether to fix the maxheath issues for Fisrt Aid or not.
    B:"Enable Maxhealth Fix"=true

    # Whether to ban infinite fluids or not.
    B:"Enable No Infinite Fluids"=true

    # Whether to add ores or not.
    B:"Enable Ores"=true

    # Whether to add the regeneration buff when player's maxhealth increased or not.
    B:"Enable Regeneration Buff"=true

    # Whether to replace naturally generated chests in world chests with loot chests or not.
    B:"Enable Replace Chest"=true

    # Whether to install the resourspacks in list automatically or not.
    B:"Enable Resourcepack Auto Installation"=true

    # A product of a mixture of water and lava.
    S:Product=netherex:basalt

    # A list of resourcepacks which will be automatically installed.
    S:Resourcepacks <
        Evolution-Reset-Resource-Pack-1.2.4.zip
        ModernityAdjunct-f3-1.6.zip
        Modernity-f3-3.10.2.zip
     >

    # Use these types of tools will consume endurance.
    S:Tools <
        pickaxe
        axe
        shovel
     >
}